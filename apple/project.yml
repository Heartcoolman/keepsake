name: Nianxiang
options:
  bundleIdPrefix: com.nianxiang
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    "CODE_SIGN_ENTITLEMENTS[sdk=macosx*]": Nianxiang/Nianxiang.entitlements
    ENABLE_HARDENED_RUNTIME: NO
    SUPPORTS_MACCATALYST: NO
targets:
  Nianxiang:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - Nianxiang
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nianxiang.app
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: Nianxiang/Info.plist
      properties:
        CFBundleDisplayName: 念想
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSMicrophoneUsageDescription: 语音输入需要使用麦克风，把你说的话变成文字。
        NSSpeechRecognitionUsageDescription: 语音输入需要语音识别，把你说的话变成文字。
        NSPhotoLibraryUsageDescription: 读取照片的拍摄日期，把回忆正确归档到时间轴。
        LSApplicationCategoryType: public.app-category.lifestyle
    scheme:
      testTargets:
        - NianxiangTests
      gatherCoverageData: false
  NianxiangTests:
    type: bundle.unit-test
    supportedDestinations: [iOS, macOS]
    sources:
      - NianxiangTests
    dependencies:
      - target: Nianxiang
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nianxiang.app.tests
        GENERATE_INFOPLIST_FILE: YES
        "TEST_HOST[sdk=macosx*]": "$(BUILT_PRODUCTS_DIR)/Nianxiang.app/Contents/MacOS/Nianxiang"
