<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <!--
      Content-Security-Policy (defense-in-depth; tokens live in localStorage by design).
      Notes:
      - This <meta> is stripped in `vite dev` (see stripCspInDev in vite.config.ts) because
        the dev-only React Fast Refresh preamble is an inline script; it stays for `vite build`.
      - Directives that a <meta> cannot express (frame-ancestors, X-Frame-Options, HSTS,
        report-to) should be set at the reverse proxy in front of /api and the static app.
      - 'wasm-unsafe-eval' + worker-src blob: are required by @huggingface/transformers
        (onnxruntime-web compiles WASM and spawns workers) for the in-browser depth fallback.
      - connect-src also lists Hugging Face / mirror / jsDelivr: the depth fallback in
        src/lib/depth.ts downloads model weights + ORT WASM from them when the server depth
        endpoint is unreachable. Tighten to just 'self' if you never want the browser ML
        fallback (server-side depth keeps working under 'self').
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; script-src 'self' 'wasm-unsafe-eval'; worker-src 'self' blob:; connect-src 'self' https://huggingface.co https://*.hf.co https://cdn-lfs.huggingface.co https://cdn-lfs-us-1.huggingface.co https://hf-mirror.com https://*.hf-mirror.com https://cdn.jsdelivr.net; form-action 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050505" />
    <title>念想</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
